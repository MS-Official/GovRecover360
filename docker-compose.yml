services:
  # PostgreSQL for application data
  postgres:
    image: postgis/postgis:15-3.4
    container_name: govrecover-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: govrecover
      POSTGRES_USER: govrecover
      POSTGRES_PASSWORD: ${DB_PASSWORD:-govrecover_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govrecover"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: govrecover-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: govrecover-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://govrecover:${DB_PASSWORD:-govrecover_2026}@postgres:5432/govrecover}
      SECRET_KEY: ${SECRET_KEY:-govrecover-super-secret-key-change-in-production}
      REDIS_URL: redis://redis:6379/0
      AI_SERVICE_URL: http://ai-service:8050
      CHOREO_NOTIFIER_API_URL: http://choreo-notification-service:8095
      CHOREO_USER_SERVICE_URL: ${CHOREO_USER_SERVICE_URL:-}
      CHOREO_SECURITY_HEADER_NAME: ${CHOREO_SECURITY_HEADER_NAME:-}
      CHOREO_SECURITY_HEADER_VALUE: ${CHOREO_SECURITY_HEADER_VALUE:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      AUTH_MODE: ${AUTH_MODE:-mock}
      ASGARDEO_ISSUER: ${ASGARDEO_ISSUER:-}
      ASGARDEO_JWKS_URL: ${ASGARDEO_JWKS_URL:-}
      ASGARDEO_AUDIENCE: ${ASGARDEO_AUDIENCE:-}
      ASGARDEO_CLIENT_ID: ${ASGARDEO_CLIENT_ID:-}
      ASGARDEO_ORG_NAME: ${ASGARDEO_ORG_NAME:-}
      ASGARDEO_SIGN_UP_URL: ${ASGARDEO_SIGN_UP_URL:-https://accounts.asgardeo.io/t/geoedge/accountrecoveryendpoint/register.do}
      ODOO_BASE_URL: ${ODOO_BASE_URL:-http://odoo:8069}
      ODOO_DB: ${ODOO_DB:-}
      ODOO_USERNAME: ${ODOO_USERNAME:-}
      ODOO_PASSWORD: ${ODOO_PASSWORD:-}
      OPENG2P_ENABLED: ${OPENG2P_ENABLED:-true}
      OPENG2P_BASE_URL: ${OPENG2P_BASE_URL:-http://openg2p:8070}
      OPENG2P_API_BASE_URL: ${OPENG2P_API_BASE_URL:-http://openg2p:8070/api}
      OPENG2P_DB: ${OPENG2P_DB:-openg2p}
      OPENG2P_USERNAME: ${OPENG2P_USERNAME:-admin}
      OPENG2P_PASSWORD: ${OPENG2P_PASSWORD:-admin}
      WSO2_APIM_ENABLED: ${WSO2_APIM_ENABLED:-true}
      WSO2_GATEWAY_URL: ${WSO2_GATEWAY_URL:-http://wso2-api-manager:8243}
      WSO2_PUBLISHER_URL: ${WSO2_PUBLISHER_URL:-http://wso2-api-manager:8243/publisher}
      WSO2_ISSUER: ${WSO2_ISSUER:-}
      WSO2_AUDIENCE: ${WSO2_AUDIENCE:-}
      WSO2_JWKS_URL: ${WSO2_JWKS_URL:-}
      WSO2_INTROSPECTION_URL: ${WSO2_INTROSPECTION_URL:-}
      WSO2_CLIENT_ID: ${WSO2_CLIENT_ID:-}
      WSO2_CLIENT_SECRET: ${WSO2_CLIENT_SECRET:-}
      SUPERSET_URL: http://superset:8088
      GEONODE_ENABLED: ${GEONODE_ENABLED:-false}
      GEONODE_URL: ${GEONODE_URL:-}
      GEONODE_USERNAME: ${GEONODE_USERNAME:-}
      GEONODE_PASSWORD: ${GEONODE_PASSWORD:-}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
    volumes:
      - ./backend:/app
    command: sh -c "chmod +x /app/entrypoint.sh && /app/entrypoint.sh"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10

  # Frontend React app
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_AUTH_MODE: ${AUTH_MODE:-mock}
        VITE_ASGARDEO_CLIENT_ID: ${ASGARDEO_CLIENT_ID:-}
        VITE_ASGARDEO_BASE_URL: ${VITE_ASGARDEO_BASE_URL:-}
        VITE_ASGARDEO_AUTH_URL: ${VITE_ASGARDEO_AUTH_URL:-}
        VITE_ASGARDEO_REDIRECT_URI: ${VITE_ASGARDEO_REDIRECT_URI:-http://localhost:3000/callback}
        VITE_ASGARDEO_LOGOUT_REDIRECT_URI: ${VITE_ASGARDEO_LOGOUT_REDIRECT_URI:-http://localhost:3000/login}
        VITE_ASGARDEO_SCOPES: ${VITE_ASGARDEO_SCOPES:-openid profile email groups}
        VITE_ASGARDEO_SIGN_UP_URL: ${VITE_ASGARDEO_SIGN_UP_URL:-https://accounts.asgardeo.io/t/geoedge/accountrecoveryendpoint/register.do}
        VITE_CHOREO_USER_SERVICE_URL: ${VITE_CHOREO_USER_SERVICE_URL:-}
        VITE_ASGARDEO_CONSOLE_URL: ${VITE_ASGARDEO_CONSOLE_URL:-https://console.asgardeo.io/t/teamcodeme}
        VITE_ASGARDEO_APPLICATION_URL: ${VITE_ASGARDEO_APPLICATION_URL:-https://console.asgardeo.io/t/teamcodeme/app/fullscreen/onboarding}
        VITE_CHOREO_CONSOLE_URL: ${VITE_CHOREO_CONSOLE_URL:-https://console.choreo.dev/organizations/choreodemo/home}
        VITE_CHOREO_ORG_URL: ${VITE_CHOREO_ORG_URL:-https://console.choreo.dev/organizations/choreodemo/home}
        VITE_WSO2_LOCAL_GATEWAY_URL: ${VITE_WSO2_LOCAL_GATEWAY_URL:-http://localhost:8243}
        VITE_ODOO_URL: ${VITE_ODOO_URL:-http://localhost:8069}
        VITE_SUPERSET_URL: ${VITE_SUPERSET_URL:-http://localhost:8088}
        VITE_OPENG2P_URL: ${VITE_OPENG2P_URL:-http://localhost:8070}
        VITE_CHOREO_NOTIFIER_URL: ${VITE_CHOREO_NOTIFIER_URL:-http://localhost:8095}
        VITE_AI_SERVICE_URL: ${VITE_AI_SERVICE_URL:-http://localhost:8050}
    container_name: govrecover-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_AUTH_MODE: ${AUTH_MODE:-mock}
      VITE_ASGARDEO_CLIENT_ID: ${ASGARDEO_CLIENT_ID:-}
      VITE_ASGARDEO_BASE_URL: ${VITE_ASGARDEO_BASE_URL:-}
      VITE_ASGARDEO_AUTH_URL: ${VITE_ASGARDEO_AUTH_URL:-}
      VITE_ASGARDEO_REDIRECT_URI: ${VITE_ASGARDEO_REDIRECT_URI:-http://localhost:3000/callback}
      VITE_ASGARDEO_LOGOUT_REDIRECT_URI: ${VITE_ASGARDEO_LOGOUT_REDIRECT_URI:-http://localhost:3000/login}
      VITE_ASGARDEO_SCOPES: ${VITE_ASGARDEO_SCOPES:-openid profile email groups}
      VITE_ASGARDEO_SIGN_UP_URL: ${VITE_ASGARDEO_SIGN_UP_URL:-https://accounts.asgardeo.io/t/geoedge/accountrecoveryendpoint/register.do}
      VITE_CHOREO_USER_SERVICE_URL: ${VITE_CHOREO_USER_SERVICE_URL:-}
      VITE_ASGARDEO_CONSOLE_URL: ${VITE_ASGARDEO_CONSOLE_URL:-https://console.asgardeo.io/t/teamcodeme}
      VITE_ASGARDEO_APPLICATION_URL: ${VITE_ASGARDEO_APPLICATION_URL:-https://console.asgardeo.io/t/teamcodeme/app/fullscreen/onboarding}
      VITE_CHOREO_CONSOLE_URL: ${VITE_CHOREO_CONSOLE_URL:-https://console.choreo.dev/organizations/choreodemo/home}
      VITE_CHOREO_ORG_URL: ${VITE_CHOREO_ORG_URL:-https://console.choreo.dev/organizations/choreodemo/home}
      VITE_WSO2_LOCAL_GATEWAY_URL: ${VITE_WSO2_LOCAL_GATEWAY_URL:-http://localhost:8243}
      VITE_ODOO_URL: ${VITE_ODOO_URL:-http://localhost:8069}
      VITE_SUPERSET_URL: ${VITE_SUPERSET_URL:-http://localhost:8088}
      VITE_OPENG2P_URL: ${VITE_OPENG2P_URL:-http://localhost:8070}
      VITE_CHOREO_NOTIFIER_URL: ${VITE_CHOREO_NOTIFIER_URL:-http://localhost:8095}
      VITE_AI_SERVICE_URL: ${VITE_AI_SERVICE_URL:-http://localhost:8050}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/ -o /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Odoo ERP
  odoo:
    image: odoo:17
    platform: linux/amd64
    container_name: govrecover-odoo
    restart: unless-stopped
    depends_on:
      - odoo-db
    ports:
      - "8069:8069"
    environment:
      HOST: odoo-db
      USER: odoo
      PASSWORD: ${ODOO_DB_PASSWORD:-odoo@2026}
    volumes:
      - odoo_data:/var/lib/odoo
      - ./odoo/addons:/mnt/extra-addons
      - ./odoo/config:/etc/odoo

  # Odoo PostgreSQL
  odoo-db:
    image: postgres:15
    container_name: govrecover-odoo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD:-odoo@2026}
    volumes:
      - odoo_db_data:/var/lib/postgresql/data

  # Apache Superset
  superset:
    image: apache/superset:latest
    container_name: govrecover-superset
    user: root
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-superset-super-secret-change-me}
      SUPERSET_LOAD_EXAMPLES: "no"
    volumes:
      - superset_data:/app/superset_home
      - ./config/superset/superset_config.py:/app/pythonpath/superset_config.py
    command: >
      sh -c "
        pip3 install psycopg2-binary -t /app/.venv/lib/python3.10/site-packages/ &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@superset.com --password ${SUPERSET_ADMIN_PASSWORD:-admin} &&
        superset db upgrade &&
        superset init &&
        superset run -p 8088 --host 0.0.0.0 --with-threads --reload
      "

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: govrecover-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    # Nginx resolves upstreams at request-time via 127.0.0.11 resolver,
    # so no hard dependency on backend/frontend being healthy at startup.
    depends_on:
      - frontend
      - backend
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf

  # AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: govrecover-ai
    restart: unless-stopped
    ports:
      - "8050:8050"
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
    volumes:
      - ./ai-service:/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8050/health', timeout=5).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # Choreo-compatible notification service
  choreo-notification-service:
    build:
      context: ./choreo-notification-service
      dockerfile: Dockerfile
    container_name: govrecover-notifications
    restart: unless-stopped
    ports:
      - "8095:8095"
    environment:
      PORT: 8095
      NOTIFICATION_PROVIDER: mock
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8095/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenG2P-compatible demo runtime for beneficiary sync and relief enrollment.
  openg2p:
    build:
      context: ./integrations/openg2p-demo
      dockerfile: Dockerfile
    container_name: govrecover-openg2p
    restart: unless-stopped
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8070/api/health', timeout=5).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # WSO2 API Manager-compatible demo gateway.
  # It exposes WSO2-style health/version endpoints and proxies /api/* to backend.
  wso2-api-manager:
    build:
      context: ./integrations/wso2-gateway-demo
      dockerfile: Dockerfile
    container_name: govrecover-wso2-apim
    restart: unless-stopped
    ports:
      - "8243:8243"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8243/health', timeout=5).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  odoo_data:
  odoo_db_data:
  superset_data:
